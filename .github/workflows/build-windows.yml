name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 取得程式碼
      uses: actions/checkout@v4

    - name: 安裝 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 強制安裝相依套件與打包工具
      run: |
        python -m pip install --upgrade pip
        pip install Pillow send2trash
        pip install pyinstaller

    - name: 執行 PyInstaller 打包 (加入隱藏套件強制打包)
      run: |
        pyinstaller --windowed --onedir --hidden-import PIL --hidden-import send2trash --name "PicProcess" main.py

    - name: 將打包結果上傳供下載
      uses: actions/upload-artifact@v4
      with:
        name: PicProcess-Windows-App
        path: dist/PicProcess
