name: Build Windows EXE

# 設定觸發條件：當程式碼有更新，或是手動點擊按鈕時執行
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 呼叫微軟的 Windows 雲端伺服器
    runs-on: windows-latest

    steps:
    - name: 取得程式碼
      uses: actions/checkout@v4

    - name: 安裝 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 使用穩定版 Python

    - name: 安裝相依套件與打包工具
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 執行 PyInstaller 打包
      run: |
        pyinstaller --windowed --onedir --name "PicProcess" main.py

    - name: 將打包結果上傳供下載
      uses: actions/upload-artifact@v4
      with:
        name: PicProcess-Windows-App
        path: dist/PicProcess
